<header class="header-banner" role="banner" aria-label="Site banner">
  <div class="header-inner page-content">
    <div class="brand">
      <a class="brand-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      {% if site.description %}
        <p class="brand-tagline">{{ site.description }}</p>
      {% endif %}
    </div>
  </div>
</header>

<aside class="sidebar" role="navigation" aria-label="Sāņu navigācija">
  <div class="sidebar-header">
    <a class="logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  </div>
  <nav class="sidebar-nav">
    <ul class="nav-list">
      {% for nav_item in site.navigation %}
        {% if nav_item.key != 'home' %}
          <li class="nav-item {% if page.url == nav_item.url %}active{% endif %}">
            <a class="nav-button" href="{{ nav_item.url | relative_url }}" role="button" {% if page.url == nav_item.url %}aria-current="page"{% endif %}>
              <span class="nav-button-label">{{ nav_item.title }}</span>
            </a>
          </li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
  <div class="sidebar-footer">
    <p class="sidebar-info">{{ site.description }}</p>
  </div>
</aside>

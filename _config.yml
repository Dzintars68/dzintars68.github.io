title: Dzīvokļu īpašnieku biedrība "Dzintars 68"
description: Dzintars 68 dzīvokļu īpašnieku biedrības oficiālā dokumentācija un informācija
email: 
author: Dzintars 68
baseurl: ""
url: "https://dzintars68.github.io"

# Jekyll konfigurācija
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Build iestatījumi
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

# Navigācijas konfigurācija
navigation:
  - title: Sākums
    url: /
    key: home
  - title: Informācija
    url: /informacija/
    key: informacija
  - title: Paziņojumi
    url: /pazinjojumi/
    key: pazinjojumi
  - title: Dokumenti
    url: /dokumenti/
    key: dokumenti
  - title: Lēmumi
    url: /lemumi/
    key: lemumi
  - title: Statūti
    url: /statuti/
    key: statuti
  - title: Biedrība
    url: /biedriba/
    key: biedriba

# Noklusējumi kolekcijām
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: "_pazinjojumi"
    values:
      layout: page

# Kolekcijas
collections:
  pazinjojumi:
    output: true
    permalink: /:collection/:name/

# Laika zona
timezone: Europe/Riga
